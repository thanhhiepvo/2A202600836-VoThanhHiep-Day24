# MedViet AI Agent — Data Access Policy
# Used in Part 6 of the data governance lab notebook
apiVersion: governance.toolkit/v1
name: medviet-data-policy
default_action: deny
rules:
  - name: allow-read-anonymized
    condition: "action.type == 'read' and action.dataset == 'anonymized'"
    action: allow
    description: "ML engineers may read anonymized training data"

  - name: allow-read-aggregated-analyst
    condition: "action.type == 'read' and action.dataset == 'aggregated' and agent.role == 'data_analyst'"
    action: allow
    description: "Data analysts may read aggregated metrics only (no PII)"

  - name: allow-read-aggregated
    condition: "action.type == 'read' and action.dataset == 'aggregated'"
    action: allow
    description: "Admin and ML roles may read aggregated metrics"

  - name: block-raw-pii
    condition: "action.dataset == 'raw_pii'"
    action: deny
    description: "Raw PII access requires admin approval — blocked for agents"

  - name: block-export-outside-vn
    condition: "action.type == 'export' and action.destination != 'VN'"
    action: deny
    description: "NĐ13 data localization — no export outside Vietnam"

  - name: require-approval-delete
    condition: "action.type == 'delete'"
    action: deny
    description: "Delete blocked for agents — human approval required via admin workflow"

  - name: block-destructive-without-approval
    condition: "action.type in ['drop', 'truncate']"
    action: deny
    description: "Destructive schema operations are never allowed for agents"
